<style>
:root {
  --bg: #080b0f;
  --bg2: #0c1018;
  --bg3: #101520;
  --border: #1a2030;
  --border2: #222a3a;
  --green: #00e87a;
  --text: #b8c8e0;
  --text2: #566070;
  --text3: #8898b0;
  --mono: "JetBrains Mono", monospace;
}
.light-mode {
  --bg: #f4f6f9;
  --bg2: #e8ecf2;
  --bg3: #dde3ec;
  --border: #c8d0dc;
  --border2: #b8c2d0;
  --green: #007a40;
  --text: #1a2030;
  --text2: #5a6880;
  --text3: #8898b0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: var(--bg); font-family: var(--mono); overflow: hidden; transition: background .3s; }

#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px; height: 46px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-wrap: nowrap;
  transition: background .3s, border-color .3s;
}
.logo { font-size: 11px; font-weight: 600; color: var(--green); letter-spacing: 2.5px; text-transform: uppercase; flex-shrink: 0; white-space: nowrap; }
.logo span { color: var(--text2); }
.vdivider { width: 1px; height: 22px; background: var(--border2); flex-shrink: 0; }
.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 5px; vertical-align: 1px; animation: blink 2s infinite; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.meta { font-size: 10px; color: var(--text2); white-space: nowrap; }
.meta b { color: var(--text); font-weight: 500; }

.tb-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; flex-shrink: 0; }
.tbtn {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 5px;
  color: var(--text2);
  font-family: var(--mono);
  font-size: 10px;
  padding: 5px 10px;
  cursor: pointer;
  letter-spacing: 0.5px;
  white-space: nowrap;
  transition: all .15s;
  display: flex; align-items: center; gap: 5px;
}
.tbtn:hover { color: var(--green); border-color: var(--green); }
.tbtn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.theme-toggle {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 5px;
  color: var(--text2);
  font-family: var(--mono);
  font-size: 10px;
  padding: 5px 10px;
  cursor: pointer;
  letter-spacing: 0.5px;
  white-space: nowrap;
  transition: all .15s;
}
.theme-toggle:hover { color: var(--green); border-color: var(--green); }

.watermark {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: 3px;
  flex-shrink: 0;
  text-transform: uppercase;
  transition: color .3s;
}
.watermark:hover { color: var(--green); }

#mindmap {
  display: block;
  width: 100vw;
  height: calc(100vh - 46px);
  margin-top: 46px;
}

.markmap {
  --markmap-font: 300 13px/1.6 "JetBrains Mono", monospace !important;
  --markmap-text-color: #b8c8e0 !important;
  --markmap-code-bg: #101520 !important;
  --markmap-code-color: #00e87a !important;
}
.markmap-dark { background: #080b0f !important; color: #b8c8e0 !important; }
.markmap-link { stroke: #1a2030 !important; stroke-width: 1px !important; fill: none !important; }
.markmap-node > circle { stroke-width: 1.5px !important; cursor: pointer; }
.markmap-foreign { font-family: var(--mono) !important; }
.markmap-foreign p, .markmap-foreign div { color: #b8c8e0 !important; }
.markmap-foreign strong { color: #566070 !important; font-weight: 500 !important; }
[data-depth="1"] .markmap-foreign div {
  font-size: 15px !important;
  font-weight: 600 !important;
  letter-spacing: 2px;
}
.light-mode .markmap-foreign p,
.light-mode .markmap-foreign div { color: #1a2030 !important; }
.light-mode .markmap-link { stroke: #c8d0dc !important; }
.light-mode .markmap-node > circle { fill: #f4f6f9 !important; }
.light-mode [data-depth="1"] .markmap-foreign div { color: #007a40 !important; }
.light-mode #mindmap { background: #f4f6f9; }

.mm-toolbar { background: var(--bg2) !important; border: 1px solid var(--border) !important; border-radius: 6px !important; transition: background .3s; }
.mm-toolbar-brand { display: none !important; }
.mm-toolbar button { color: var(--text2) !important; font-family: var(--mono) !important; background: transparent !important; border: none !important; transition: color .15s; }
.mm-toolbar button:hover { color: var(--green) !important; }
.mm-toolbar svg { stroke: currentColor !important; }

body::before {
  content: "";
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,232,122,0.005) 2px, rgba(0,232,122,0.005) 3px);
  pointer-events: none; z-index: 999;
}
body::after {
  content: "";
  position: fixed; top: 46px; left: 0; right: 0; bottom: 0;
  background-image: radial-gradient(circle, #1a2030 0.8px, transparent 0.8px);
  background-size: 28px 28px;
  pointer-events: none; z-index: 0; opacity: 0.45;
}

<script>
document.getElementById("mindmap").style.background = "#080b0f";
document.documentElement.classList.add("markmap-dark");

let isDark = true;
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle("light-mode", !isDark);
  document.getElementById("mindmap").style.background = isDark ? "#080b0f" : "#f4f6f9";
  document.getElementById("theme-btn").textContent = isDark ? "[ dark ]" : "[ light ]";
  if (isDark) {
    document.documentElement.classList.add("markmap-dark");
  } else {
    document.documentElement.classList.remove("markmap-dark");
  }
}

function exportSVG() {
  const svg = document.getElementById("mindmap");
  const clone = svg.cloneNode(true);
  clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
  clone.setAttribute("xmlns:xhtml", "http://www.w3.org/1999/xhtml");
  clone.style.background = isDark ? "#080b0f" : "#f4f6f9";
  const allStyles = Array.from(document.styleSheets).map(sheet => {
    try { return Array.from(sheet.cssRules).map(r => r.cssText).join("\n"); }
    catch(e) { return ""; }
  }).join("\n");
  const styleEl = document.createElementNS("http://www.w3.org/2000/svg","style");
  styleEl.textContent = allStyles;
  clone.insertBefore(styleEl, clone.firstChild);
  const svgRect = svg.getBoundingClientRect();
  clone.setAttribute("width", svgRect.width);
  clone.setAttribute("height", svgRect.height);
  const serializer = new XMLSerializer();
  let svgStr = '<?xml version="1.0" encoding="UTF-8"?>\n' + serializer.serializeToString(clone);
  const blob = new Blob([svgStr], {type:"image/svg+xml;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "personal-osint-lordsudo.svg";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
</script>
